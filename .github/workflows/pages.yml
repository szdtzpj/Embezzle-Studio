name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Android APK
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

env:
  RELEASE_OWNER: szdtzpj

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    steps:
      - name: Require owner-controlled manual execution
        if: ${{ github.event_name == 'workflow_dispatch' || github.run_attempt > 1 }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_TRIGGERING_ACTOR" != "$RELEASE_OWNER" ]]; then
            echo "::error::Only $RELEASE_OWNER may manually start or rerun the Pages publication workflow."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build web
        run: npm run build:web

      - name: Stage verified release for public update checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/stage-release-for-pages.mjs dist

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
          include-hidden-files: true

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Require owner-controlled deployment rerun
        if: ${{ github.event_name == 'workflow_dispatch' || github.run_attempt > 1 }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_TRIGGERING_ACTOR" != "$RELEASE_OWNER" ]]; then
            echo "::error::Only $RELEASE_OWNER may manually start or rerun the Pages deployment job."
            exit 1
          fi

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
