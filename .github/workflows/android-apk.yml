name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag, for example v1.0.4
        required: true
        type: string

permissions:
  contents: read

env:
  ANDROID_BUILD_TOOLS_VERSION: 36.0.0
  RELEASE_OWNER: szdtzpj

concurrency:
  group: android-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release_contract:
    name: Validate release contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: android-release
    permissions:
      contents: write
    outputs:
      tag_commit: ${{ steps.release_contract.outputs.tag_commit }}
      main_commit: ${{ steps.release_contract.outputs.main_commit }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Require owner-triggered release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_ACTOR" != "$RELEASE_OWNER" || "$GITHUB_TRIGGERING_ACTOR" != "$RELEASE_OWNER" ]]; then
            echo "::error::Only $RELEASE_OWNER may start or rerun the production Android release workflow."
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::The production Android release workflow must be dispatched from refs/heads/main."
            exit 1
          fi

      - name: Checkout release metadata
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag and owner-authored draft
        id: release_contract
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release_tag must be a version tag such as v1.0.4."
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "::error::Tag $RELEASE_TAG does not exist in the repository. Push the tag before running this workflow."
            exit 1
          fi

          if ! release_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json author,isDraft,isImmutable,isPrerelease,tagName)"; then
            echo "::error::Unable to read GitHub Release draft $RELEASE_TAG. Confirm that the owner-authored draft exists and that this isolated preflight job retains contents: write."
            exit 1
          fi
          if [[ "$(jq -r '.tagName' <<<"$release_json")" != "$RELEASE_TAG" ||
                "$(jq -r '.author.login' <<<"$release_json")" != "$RELEASE_OWNER" ||
                "$(jq -r '.isDraft' <<<"$release_json")" != "true" ||
                "$(jq -r '.isPrerelease' <<<"$release_json")" != "false" ||
                "$(jq -r '.isImmutable' <<<"$release_json")" != "false" ]]; then
            echo "::error::GitHub Release $RELEASE_TAG must be a mutable draft authored by $RELEASE_OWNER and must not be a prerelease."
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
          main_commit="$(git rev-parse origin/main)"
          if [[ ! "$tag_commit" =~ ^[0-9a-f]{40}$ || ! "$main_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Unable to resolve the release tag and origin/main to full commit SHAs."
            exit 1
          fi

          if [[ "$tag_commit" != "$main_commit" ]]; then
            echo "::error::Tag $RELEASE_TAG must point to the exact current origin/main commit ($main_commit)."
            exit 1
          fi

          git checkout --detach "refs/tags/$RELEASE_TAG"

          expected_version="${RELEASE_TAG#v}"
          app_version="$(node -p "require('./app.json').expo.version")"
          package_version="$(node -p "require('./package.json').version")"
          lock_version="$(node -p "require('./package-lock.json').version")"
          lock_root_version="$(node -p "require('./package-lock.json').packages[''].version")"
          app_info_version="$(sed -n "s/^[[:space:]]*version: '\([^']*\)'.*/\1/p" src/data/appInfo.ts | head -n 1)"
          version_code="$(node -p "require('./app.json').expo.android.versionCode")"

          if [[ "$app_version" != "$expected_version" ||
                "$package_version" != "$expected_version" ||
                "$lock_version" != "$expected_version" ||
                "$lock_root_version" != "$expected_version" ||
                "$app_info_version" != "$expected_version" ]]; then
            echo "::error::Release tag $RELEASE_TAG must match app.json, package.json, package-lock.json, and src/data/appInfo.ts."
            printf 'Resolved versions: app=%s package=%s lock=%s lock-root=%s appInfo=%s\n' \
              "$app_version" "$package_version" "$lock_version" "$lock_root_version" "$app_info_version"
            exit 1
          fi

          if [[ ! "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::app.json expo.android.versionCode must be a positive integer."
            exit 1
          fi

          stable_tags="$(git tag --merged "$main_commit" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V || true)"
          latest_stable_tag="$(tail -n 1 <<<"$stable_tags")"
          if [[ "$latest_stable_tag" != "$RELEASE_TAG" ]]; then
            echo "::error::$RELEASE_TAG must be the highest stable version tag reachable from origin/main (found $latest_stable_tag)."
            exit 1
          fi
          previous_tag="$(grep -Fxv "$RELEASE_TAG" <<<"$stable_tags" | tail -n 1 || true)"
          if [[ -n "$previous_tag" ]]; then
            previous_version_code="$(git show "$previous_tag:app.json" | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>process.stdout.write(String(JSON.parse(s).expo.android.versionCode)))")"
            if [[ ! "$previous_version_code" =~ ^[1-9][0-9]*$ ]] || (( version_code <= previous_version_code )); then
              echo "::error::versionCode $version_code must be greater than $previous_version_code from $previous_tag."
              exit 1
            fi
          fi

          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "main_commit=$main_commit" >> "$GITHUB_OUTPUT"

  build:
    name: Validate and build unsigned APK
    needs: release_contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      tag_commit: ${{ steps.validated_checkout.outputs.tag_commit }}
      main_commit: ${{ steps.validated_checkout.outputs.main_commit }}
    env:
      CI: 1
      RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_TAG_COMMIT: ${{ needs.release_contract.outputs.tag_commit }}
      EXPECTED_MAIN_COMMIT: ${{ needs.release_contract.outputs.main_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release_contract.outputs.tag_commit }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify validated release checkout
        id: validated_checkout
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$EXPECTED_TAG_COMMIT" =~ ^[0-9a-f]{40}$ ||
                ! "$EXPECTED_MAIN_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::The validated release tag/main commit outputs are missing or malformed."
            exit 1
          fi
          actual_head="$(git rev-parse HEAD)"
          if [[ "$actual_head" != "$EXPECTED_TAG_COMMIT" ]]; then
            echo "::error::Checkout resolved to $actual_head instead of validated release commit $EXPECTED_TAG_COMMIT."
            exit 1
          fi

          echo "tag_commit=$EXPECTED_TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "main_commit=$EXPECTED_MAIN_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17
          verify-signature: true

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Prebuild Android project
        env:
          CI: 1
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Disable generated debug signing for release
        shell: bash
        run: |
          set -euo pipefail

          build_file="android/app/build.gradle"
          sed -i '/^[[:space:]]*release[[:space:]]*{/,/^[[:space:]]*}/ {/signingConfig.*signingConfigs.*debug/d;}' "$build_file"

          if sed -n '/^[[:space:]]*release[[:space:]]*{/,/^[[:space:]]*}/p' "$build_file" | grep -q 'signingConfig'; then
            echo "::error::Generated release build still has a signing config; an unsigned APK is required before apksigner runs."
            exit 1
          fi

      - name: Build unsigned release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Require unsigned APK output
        shell: bash
        run: |
          set -euo pipefail
          test -f android/app/build/outputs/apk/release/app-release-unsigned.apk || {
            echo "::error::Gradle did not produce app-release-unsigned.apk. Refusing to sign an unknown output."
            exit 1
          }

      - name: Verify packaged identity, SDK levels, and permission contract
        shell: bash
        run: |
          set -euo pipefail

          apk="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          aapt="$ANDROID_HOME/build-tools/$ANDROID_BUILD_TOOLS_VERSION/aapt"
          if [[ -z "$aapt" || ! -x "$aapt" ]]; then
            echo "::error::Pinned aapt was not found at $aapt."
            exit 1
          fi

          badging="$($aapt dump badging "$apk")"
          permissions="$($aapt dump permissions "$apk")"
          printf '%s\n' "$badging"
          printf '%s\n' "$permissions"

          package_line="$(grep -m 1 '^package:' <<<"$badging")"
          actual_package="$(sed -n "s/.* name='\([^']*\)'.*/\1/p" <<<"$package_line")"
          actual_version_code="$(sed -n "s/.* versionCode='\([^']*\)'.*/\1/p" <<<"$package_line")"
          actual_version_name="$(sed -n "s/.* versionName='\([^']*\)'.*/\1/p" <<<"$package_line")"
          actual_min_sdk="$(sed -n "s/^sdkVersion:'\([^']*\)'.*/\1/p" <<<"$badging" | head -n 1)"
          actual_target_sdk="$(sed -n "s/^targetSdkVersion:'\([^']*\)'.*/\1/p" <<<"$badging" | head -n 1)"

          expected_package="com.szdtzpj.embezzlestudio"
          expected_version_name="${RELEASE_TAG#v}"
          expected_version_code="$(node -p "require('./app.json').expo.android.versionCode")"
          expected_min_sdk="24"
          expected_target_sdk="36"

          if [[ "$actual_package" != "$expected_package" ||
                "$actual_version_name" != "$expected_version_name" ||
                "$actual_version_code" != "$expected_version_code" ||
                "$actual_min_sdk" != "$expected_min_sdk" ||
                "$actual_target_sdk" != "$expected_target_sdk" ]]; then
            echo "::error::Packaged Android identity or SDK levels do not match the release contract."
            printf 'Expected package=%s versionName=%s versionCode=%s minSdk=%s targetSdk=%s\n' \
              "$expected_package" "$expected_version_name" "$expected_version_code" "$expected_min_sdk" "$expected_target_sdk"
            printf 'Actual   package=%s versionName=%s versionCode=%s minSdk=%s targetSdk=%s\n' \
              "$actual_package" "$actual_version_name" "$actual_version_code" "$actual_min_sdk" "$actual_target_sdk"
            exit 1
          fi

          for forbidden_permission in \
            android.permission.SYSTEM_ALERT_WINDOW \
            android.permission.CAMERA; do
            if grep -Fq "$forbidden_permission" <<<"$permissions"; then
              echo "::error::Forbidden permission $forbidden_permission is present in the packaged manifest."
              exit 1
            fi
          done

          if ! grep -Fq "android.permission.RECORD_AUDIO" <<<"$permissions"; then
            echo "::error::Voice input is enabled but RECORD_AUDIO is missing from the packaged manifest."
            exit 1
          fi

      - name: Upload unsigned APK for isolated signing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Embezzle-Studio-${{ inputs.release_tag }}-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  sign:
    name: Sign and verify APK
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: android-release
    permissions: {}
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Require owner-controlled signing
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_ACTOR" != "$RELEASE_OWNER" || "$GITHUB_TRIGGERING_ACTOR" != "$RELEASE_OWNER" ]]; then
            echo "::error::Only $RELEASE_OWNER may start or rerun the production Android signing job."
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::The production Android signing job may run only from refs/heads/main."
            exit 1
          fi

      - name: Require stable Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEY_ALIAS \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_PASSWORD \
            ANDROID_SIGNING_CERT_SHA256; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required Android release signing secret(s): %s\n' "${missing[*]}"
            echo "::error::Configure them in the protected android-release environment. Debug signing is intentionally forbidden."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17
          verify-signature: true

      - name: Download unsigned APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Embezzle-Studio-${{ inputs.release_tag }}-unsigned
          path: unsigned

      - name: Sign and verify release APK
        id: signed_apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail

          unsigned_apk="$GITHUB_WORKSPACE/unsigned/app-release-unsigned.apk"
          if [[ ! -f "$unsigned_apk" ]]; then
            echo "::error::Unsigned APK artifact is missing at $unsigned_apk."
            exit 1
          fi

          build_tools_dir="$ANDROID_HOME/build-tools/$ANDROID_BUILD_TOOLS_VERSION"
          apksigner="$build_tools_dir/apksigner"
          if [[ -z "$apksigner" || ! -x "$apksigner" ]]; then
            echo "::error::Pinned apksigner was not found at $apksigner."
            exit 1
          fi

          zipalign="$build_tools_dir/zipalign"
          if [[ ! -x "$zipalign" ]]; then
            echo "::error::zipalign was not found next to apksigner in $build_tools_dir."
            exit 1
          fi

          signing_dir="$RUNNER_TEMP/embezzle-android-signing"
          release_dir="$GITHUB_WORKSPACE/release"
          keystore="$signing_dir/release.p12"
          aligned_apk="$signing_dir/aligned-unsigned.apk"
          apk_name="Embezzle-Studio-${RELEASE_TAG}-release.apk"
          signed_apk="$release_dir/$apk_name"
          report="$release_dir/apksigner-report.txt"

          mkdir -p "$signing_dir" "$release_dir"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 600 "$keystore"

          keytool -list \
            -storetype PKCS12 \
            -keystore "$keystore" \
            -storepass:env ANDROID_KEYSTORE_PASSWORD \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

          if "$apksigner" verify "$unsigned_apk" >/dev/null 2>&1; then
            echo "::error::The purported unsigned APK already contains a verifiable signature."
            exit 1
          fi

          "$zipalign" -f -P 16 4 "$unsigned_apk" "$aligned_apk"
          "$apksigner" sign \
            --ks "$keystore" \
            --ks-type PKCS12 \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "$signed_apk" \
            "$aligned_apk"

          "$apksigner" verify --verbose --print-certs "$signed_apk" | tee "$report"
          "$zipalign" -c -P 16 -v 4 "$signed_apk"

          if grep -qi 'Android Debug' "$report"; then
            echo "::error::The signed APK uses an Android Debug certificate. Publication is forbidden."
            exit 1
          fi
          if ! grep -Fq 'Verified using v2 scheme (APK Signature Scheme v2): true' "$report"; then
            echo "::error::The release APK must verify with APK Signature Scheme v2."
            exit 1
          fi

          mapfile -t signer_digests < <(sed -n 's/^Signer #[0-9][0-9]* certificate SHA-256 digest: //p' "$report")
          if (( ${#signer_digests[@]} != 1 )); then
            echo "::error::The release APK must contain exactly one signer; found ${#signer_digests[@]}."
            exit 1
          fi
          actual_cert_sha256="$(printf '%s' "${signer_digests[0]}" | tr -d ':[:space:]' | tr '[:lower:]' '[:upper:]')"
          expected_cert_sha256="$(printf '%s' "$ANDROID_SIGNING_CERT_SHA256" | tr -d ':[:space:]' | tr '[:lower:]' '[:upper:]')"
          if [[ -z "$actual_cert_sha256" || "$actual_cert_sha256" != "$expected_cert_sha256" ]]; then
            echo "::error::Signing certificate SHA-256 does not match ANDROID_SIGNING_CERT_SHA256."
            exit 1
          fi

          (
            cd "$release_dir"
            sha256sum "$apk_name" | tee "$apk_name.sha256"
          )

          echo "artifact_name=Embezzle-Studio-${RELEASE_TAG}-signed" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Remove signing material
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/embezzle-android-signing"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.signed_apk.outputs.artifact_name }}
          path: |
            release/${{ steps.signed_apk.outputs.apk_name }}
            release/${{ steps.signed_apk.outputs.apk_name }}.sha256
            release/apksigner-report.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish:
    name: Publish immutable GitHub Release
    needs:
      - build
      - sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: android-release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_TAG_COMMIT: ${{ needs.build.outputs.tag_commit }}
      EXPECTED_MAIN_COMMIT: ${{ needs.build.outputs.main_commit }}
    steps:
      - name: Require owner-triggered publication
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_ACTOR" != "$RELEASE_OWNER" || "$GITHUB_TRIGGERING_ACTOR" != "$RELEASE_OWNER" ]]; then
            echo "::error::Only $RELEASE_OWNER may publish or rerun the production Android release workflow."
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::The production Android publication job may run only from refs/heads/main."
            exit 1
          fi

      - name: Download signed APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Embezzle-Studio-${{ inputs.release_tag }}-signed
          path: release

      - name: Validate empty owner-authored draft
        id: draft_check
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets,author,isDraft,isImmutable,isPrerelease,tagName)"

          if [[ "$(jq -r '.tagName' <<<"$release_json")" != "$RELEASE_TAG" ||
                "$(jq -r '.author.login' <<<"$release_json")" != "$RELEASE_OWNER" ||
                "$(jq -r '.isDraft' <<<"$release_json")" != "true" ||
                "$(jq -r '.isPrerelease' <<<"$release_json")" != "false" ||
                "$(jq -r '.isImmutable' <<<"$release_json")" != "false" ]]; then
            echo "::error::Release $RELEASE_TAG is no longer the expected owner-authored mutable draft."
            exit 1
          fi

          if (( $(jq '.assets | length' <<<"$release_json") != 0 )); then
            echo "::error::Release draft $RELEASE_TAG must be empty before this workflow uploads its verified assets."
            exit 1
          fi

          if [[ ! "$EXPECTED_TAG_COMMIT" =~ ^[0-9a-f]{40}$ ||
                ! "$EXPECTED_MAIN_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::The validated build tag/main commit outputs are missing or malformed."
            exit 1
          fi
          remote_tag_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq '.sha')"
          remote_main_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.sha')"
          if [[ "$remote_tag_commit" != "$EXPECTED_TAG_COMMIT" ||
                "$remote_main_commit" != "$EXPECTED_MAIN_COMMIT" ]]; then
            echo "::error::Release refs changed after the build contract was validated. Expected tag=$EXPECTED_TAG_COMMIT main=$EXPECTED_MAIN_COMMIT; found tag=$remote_tag_commit main=$remote_main_commit."
            exit 1
          fi

          echo "empty=true" >> "$GITHUB_OUTPUT"

      - name: Upload verified assets to draft
        shell: bash
        run: |
          set -euo pipefail
          apk_name="Embezzle-Studio-${RELEASE_TAG}-release.apk"

          gh release upload "$RELEASE_TAG" \
            "release/$apk_name" \
            "release/$apk_name.sha256" \
            "release/apksigner-report.txt" \
            --repo "$GITHUB_REPOSITORY"

      - name: Verify assets and publish immutable Release
        shell: bash
        run: |
          set -euo pipefail

          apk_name="Embezzle-Studio-${RELEASE_TAG}-release.apk"
          expected_names=("$apk_name" "$apk_name.sha256" "apksigner-report.txt")

          verify_remote_refs() {
            local remote_tag_commit remote_main_commit
            if [[ ! "$EXPECTED_TAG_COMMIT" =~ ^[0-9a-f]{40}$ ||
                  ! "$EXPECTED_MAIN_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::The validated build tag/main commit outputs are missing or malformed."
              return 1
            fi
            remote_tag_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq '.sha')"
            remote_main_commit="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.sha')"
            if [[ "$remote_tag_commit" != "$EXPECTED_TAG_COMMIT" ||
                  "$remote_main_commit" != "$EXPECTED_MAIN_COMMIT" ]]; then
              echo "::error::Release refs no longer match the validated commits tag=$EXPECTED_TAG_COMMIT main=$EXPECTED_MAIN_COMMIT; found tag=$remote_tag_commit main=$remote_main_commit."
              return 1
            fi
          }

          verify_assets() {
            local release_json="$1"
            local name file matches local_digest remote_digest asset_api_url uploader

            if (( $(jq '.assets | length' <<<"$release_json") != ${#expected_names[@]} )); then
              echo "::error::Release contains an unexpected number of assets."
              return 1
            fi

            for name in "${expected_names[@]}"; do
              file="release/$name"
              matches="$(jq -c --arg name "$name" '[.assets[] | select(.name == $name)]' <<<"$release_json")"
              if (( $(jq 'length' <<<"$matches") != 1 )); then
                echo "::error::Release must contain exactly one asset named $name."
                return 1
              fi

              if [[ "$(jq -r '.[0].state' <<<"$matches")" != "uploaded" ]]; then
                echo "::error::Release asset $name is not in the uploaded state."
                return 1
              fi

              local_digest="sha256:$(sha256sum "$file" | awk '{print $1}')"
              remote_digest="$(jq -r '.[0].digest // ""' <<<"$matches" | tr '[:upper:]' '[:lower:]')"
              if [[ -z "$remote_digest" || "$remote_digest" != "$local_digest" ]]; then
                echo "::error::GitHub digest for $name does not match the local verified file."
                return 1
              fi

              asset_api_url="$(jq -r '.[0].apiUrl' <<<"$matches")"
              uploader="$(gh api "$asset_api_url" --jq '.uploader.login')"
              if [[ "$uploader" != "github-actions[bot]" ]]; then
                echo "::error::Release asset $name was uploaded by unexpected actor $uploader."
                return 1
              fi
            done
          }

          if ! (cd release && sha256sum --check --strict --status "$apk_name.sha256"); then
            echo "::error::The signed APK does not match its workflow-generated checksum file."
            exit 1
          fi

          verify_remote_refs
          release_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets,author,isDraft,isImmutable,isPrerelease,tagName)"

          if [[ "$(jq -r '.author.login' <<<"$release_json")" != "$RELEASE_OWNER" ||
                "$(jq -r '.isDraft' <<<"$release_json")" != "true" ||
                "$(jq -r '.isImmutable' <<<"$release_json")" != "false" ||
                "$(jq -r '.isPrerelease' <<<"$release_json")" != "false" ||
                "$(jq -r '.tagName' <<<"$release_json")" != "$RELEASE_TAG" ]]; then
            echo "::error::Release draft state changed while assets were uploading."
            exit 1
          fi

          verify_assets "$release_json"

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease=false \
            --latest \
            --verify-tag

          published_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets,author,isDraft,isImmutable,isPrerelease,tagName)"
          if [[ "$(jq -r '.isDraft' <<<"$published_json")" != "false" ||
                "$(jq -r '.isPrerelease' <<<"$published_json")" != "false" ||
                "$(jq -r '.isImmutable' <<<"$published_json")" != "true" ||
                "$(jq -r '.author.login' <<<"$published_json")" != "$RELEASE_OWNER" ||
                "$(jq -r '.tagName' <<<"$published_json")" != "$RELEASE_TAG" ]]; then
            echo "::error::Published Release is not the expected immutable stable release."
            exit 1
          fi

          verify_remote_refs
          verify_assets "$published_json"

          latest_tag="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name')"
          if [[ "$latest_tag" != "$RELEASE_TAG" ]]; then
            echo "::error::GitHub latest Release is $latest_tag, not $RELEASE_TAG."
            exit 1
          fi

      - name: Clean workflow-owned partial draft assets after failure
        if: ${{ failure() && steps.draft_check.outputs.empty == 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets,author,isDraft,isImmutable)"
          if [[ "$(jq -r '.author.login' <<<"$release_json")" != "$RELEASE_OWNER" ||
                "$(jq -r '.isDraft' <<<"$release_json")" != "true" ||
                "$(jq -r '.isImmutable' <<<"$release_json")" != "false" ]]; then
            echo "Release is no longer the mutable owner-authored draft; skipping cleanup."
            exit 0
          fi

          apk_name="Embezzle-Studio-${RELEASE_TAG}-release.apk"
          for name in "$apk_name" "$apk_name.sha256" "apksigner-report.txt"; do
            asset_api_url="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .apiUrl' <<<"$release_json" | head -n 1)"
            [[ -n "$asset_api_url" ]] || continue
            uploader="$(gh api "$asset_api_url" --jq '.uploader.login')"
            if [[ "$uploader" == "github-actions[bot]" ]]; then
              gh api --method DELETE "$asset_api_url"
              echo "Removed workflow-owned partial asset $name from the draft."
            else
              echo "Skipping partial asset $name uploaded by $uploader."
            fi
          done
